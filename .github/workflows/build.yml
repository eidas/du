name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu, x86_64-unknown-linux-gnu

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y mingw-w64

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build Windows binary
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Build Linux binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p pages
          cp target/x86_64-pc-windows-gnu/release/du.exe pages/du-windows-x86_64.exe
          cp target/x86_64-unknown-linux-gnu/release/du pages/du-linux-x86_64
          cat > pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>du — Disk Usage Tool</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; }
              h1 { font-size: 1.5rem; }
              .dl { display: flex; gap: 1rem; margin: 2rem 0; }
              a.btn {
                display: inline-block; padding: .6rem 1.2rem;
                background: #0969da; color: #fff; border-radius: 6px;
                text-decoration: none; font-weight: 600;
              }
              a.btn:hover { background: #0550ae; }
              pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>du — Disk Usage Tool</h1>
            <p>LinuxのduコマンドのWindows/Linux向けCLIツールです。</p>

            <h2>ダウンロード</h2>
            <div class="dl">
              <a class="btn" href="du-windows-x86_64.exe">Windows (x86_64)</a>
              <a class="btn" href="du-linux-x86_64">Linux (x86_64)</a>
            </div>

            <h2>使い方</h2>
            <pre>du [OPTIONS] [PATH]

Options:
  -d, --depth &lt;N&gt;      表示する階層の深さを制限
  -H, --human-readable  KB/MB/GB 単位で表示
  -s, --summarize       合計サイズのみ表示
  -h, --help            ヘルプを表示

Examples:
  du .                  カレントディレクトリを再帰的に表示
  du -H -d 2 C:\Users   深さ2まで人間が読みやすい形式で表示
  du -s D:\Projects     合計サイズのみ表示</pre>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
